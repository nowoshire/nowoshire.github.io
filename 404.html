<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<title>Redirecting…</title>
		<script>
			// Preserve the full path, query string, and hash
			const dest = "https://averlyst.github.io"
			  + window.location.pathname
			  + window.location.search
			  + window.location.hash;
			window.location.replace(dest);
		</script>
	</head>
	<body>
		<p>This page has moved. <a id="link" href="https://averlyst.github.io">Click here if you are not redirected.</a></p>
		<script>
			document.getElementById("link").href = dest;
		</script>
	</body>
</html>
